<!DOCTYPE html>
<html>
<head>
  <title>Deepak Paint & Hardware Store</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">🎨 Deepak Paint & Hardware Store</div>

<div class="container">

<!-- 🔍 SEARCH -->
<form method="GET" action="/items" class="top-bar">
  <input name="search" placeholder="🔍 Search items..." value="{{search}}">

  <select name="category">
    <option value="">All</option>
    <option {% if category=='Paint' %}selected{% endif %}>Paint</option>
    <option {% if category=='Hardware' %}selected{% endif %}>Hardware</option>
  </select>

  <button>Search</button>
</form>

<!-- ➕ ADD -->
<div style="text-align:center;">
  <a href="/add"><button>+ Add Item</button></a>
</div>

<!-- 📦 ITEMS GRID -->
<div class="grid">

{% for item in items %}
<div class="card">

  <!-- IMAGE -->
  <div class="img-box">
    <img src="{{ url_for('static', filename='uploads/' + item.image) }}"
         class="card-img"
         onclick="openImage(this.src)"
         onerror="this.src='https://via.placeholder.com/200'">
  </div>

  <!-- DETAILS -->
  <div class="card-body">

    <h3 class="item-title">{{item.name}}</h3>

    <p class="item-weight">⚖ {{item.weight}}</p>

    <p class="item-price">💰 ₹{{item.purchase_price}}</p>

    <p class="item-quality">⭐ {{item.quality}}</p>

    <!-- ACTION -->
    <div class="actions">
      <a href="/edit/{{item.id}}">
        <button class="edit">Edit</button>
      </a>

      <a href="/delete/{{item.id}}">
        <button class="delete">Delete</button>
      </a>
    </div>

  </div>

</div>
{% endfor %}

</div>

<!-- 🔥 PAGINATION -->
<div class="pagination">

  {% if page > 1 %}
    <a href="/items?page={{page-1}}&search={{search}}&category={{category}}">
      <button>⬅ Prev</button>
    </a>
  {% endif %}

  {% for p in range(1, total_pages+1) %}
    <a href="/items?page={{p}}&search={{search}}&category={{category}}">
      <button class="{% if p == page %}active{% endif %}">
        {{p}}
      </button>
    </a>
  {% endfor %}

  {% if page < total_pages %}
    <a href="/items?page={{page+1}}&search={{search}}&category={{category}}">
      <button>Next ➡</button>
    </a>
  {% endif %}

</div>

</div>

<!-- 🔍 IMAGE POPUP -->
<div id="imgModal" class="modal" onclick="closeImage()">
  <span class="close">&times;</span>
  <img class="modal-content" id="fullImg">
</div>

<script>
function openImage(src) {
  document.getElementById("imgModal").style.display = "flex";
  document.getElementById("fullImg").src = src;
}

function closeImage() {
  document.getElementById("imgModal").style.display = "none";
}
</script>

</body>
</html>
